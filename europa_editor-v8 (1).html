<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Star Field Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0f; --panel: #141415;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --text: #e8e8e4; --text2: #888884; --text3: #444442;
  --accent: #c8c8c0; --pill-on: #e8e8e4; --pill-on-text: #0e0e0f;
  --thumb: #666660; --track: #2a2a2c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { display: flex; font-family: 'DM Sans', sans-serif; color: var(--text); font-size: 13px; }

/* SIDEBAR */
#sidebar {
  width: 280px; min-width: 280px; height: 100vh;
  background: var(--panel); border-right: 0.5px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
}
#sidebar-brand { padding: 14px 16px 10px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
#sidebar-brand h1 { font-size: 13px; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2); font-family: 'DM Mono', monospace; }
#sidebar-brand p { font-size: 11px; color: var(--text3); margin-top: 3px; font-family: 'DM Mono', monospace; }

/* Tab bar */
#sidebar-tabs { display: flex; flex-shrink: 0; border-bottom: 0.5px solid var(--border); }
.stab { flex: 1; padding: 10px 0 9px; font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); background: none; border: none; cursor: pointer; border-bottom: 1.5px solid transparent; margin-bottom: -0.5px; transition: color 0.15s, border-color 0.15s; }
.stab:hover { color: var(--text2); }
.stab.on { color: var(--text); border-bottom-color: var(--text); }

/* Tab panels */
#tab-editor  { display: flex; flex-direction: column; flex: 1; min-height: 0; }
#tab-presets { display: none; flex-direction: column; flex: 1; min-height: 0; }

/* Editor scroll */
#sidebar-scroll { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; scrollbar-width: thin; scrollbar-color: var(--track) transparent; }
#sidebar-scroll::-webkit-scrollbar { width: 3px; }
#sidebar-scroll::-webkit-scrollbar-thumb { background: var(--track); border-radius: 2px; }

.section { border-bottom: 0.5px solid var(--border); }
.section-head { padding: 11px 16px 9px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); font-family: 'DM Mono', monospace; }
.section-body { padding: 4px 14px 12px; }

.pill-row { display: flex; flex-wrap: wrap; gap: 5px; padding: 0 0 4px; }
.pill { font-size: 11px; padding: 4px 12px; border-radius: 20px; border: 0.5px solid var(--border2); color: var(--text2); background: transparent; cursor: pointer; transition: all 0.15s; font-family: 'DM Mono', monospace; letter-spacing: 0.02em; }
.pill:hover { border-color: var(--accent); color: var(--text); }
.pill.on { background: var(--pill-on); color: var(--pill-on-text); border-color: transparent; }

.ctrl { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
.ctrl label { font-size: 11px; color: var(--text2); min-width: 72px; font-family: 'DM Mono', monospace; }
.ctrl input[type=range] { flex: 1; -webkit-appearance: none; appearance: none; height: 2px; background: var(--track); border-radius: 1px; outline: none; cursor: pointer; }
.ctrl input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 8px; border-radius: 8px; background: var(--thumb); border: 1.5px solid var(--text); transition: background 0.15s; }
.ctrl input[type=range]:hover::-webkit-slider-thumb { background: var(--text); }
.ctrl .val { font-size: 11px; color: var(--text2); min-width: 30px; text-align: right; font-family: 'DM Mono', monospace; }

.export-btn { margin: 12px 14px 14px; width: calc(100% - 28px); padding: 9px; background: transparent; border: 0.5px solid var(--border2); color: var(--text2); font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; border-radius: 6px; transition: all 0.15s; }
.export-btn:hover { border-color: var(--accent); color: var(--text); background: rgba(255,255,255,0.04); }



/* Presets tab */
#presets-panel { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; scrollbar-width: thin; scrollbar-color: var(--track) transparent; padding: 10px 10px 4px; display: flex; flex-direction: column; gap: 6px; }
#presets-panel::-webkit-scrollbar { width: 3px; }
#presets-panel::-webkit-scrollbar-thumb { background: var(--track); border-radius: 2px; }
#presets-bottom { flex-shrink: 0; border-top: 0.5px solid var(--border); padding: 8px 10px 10px; display: flex; flex-direction: column; gap: 5px; }
#preset-name-row { display: flex; gap: 5px; align-items: center; }
#preset-name-input { flex: 1; background: transparent; border: 0.5px solid var(--border2); border-radius: 6px; padding: 7px 9px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px; outline: none; transition: border-color 0.15s; }
#preset-name-input:focus { border-color: var(--accent); }
#presets-empty { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); text-align: center; padding: 28px 0 8px; line-height: 2; }

.pcard { border: 0.5px solid var(--border); border-radius: 5px; padding: 0; cursor: pointer; transition: border-color 0.15s, background 0.15s; background: transparent; display: flex; align-items: stretch; overflow: hidden; }
.pcard:hover { border-color: var(--border2); background: rgba(255,255,255,0.02); }
.pcard.active { border-color: var(--accent); }
.pcard-thumb-wrap { width: 52px; flex-shrink: 0; overflow: hidden; background: #0a0a0b; }
.pcard-thumb { width: 52px; height: 52px; display: block; object-fit: cover; opacity: 0.8; }
.pcard-thumb-empty { width: 52px; height: 52px; background: var(--panel); }
.pcard-lottie-thumb { width: 52px; height: 52px; background: #111; display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
.pcard-lottie-thumb .lottie-loading { font-size:9px; color: var(--text3); font-family: 'DM Mono',monospace; }
.pcard-body { flex: 1; min-width: 0; padding: 8px 9px; display: flex; flex-direction: column; justify-content: center; gap: 3px; }
.pcard-top { display: flex; align-items: center; gap: 6px; }
.pcard-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.pcard-name { flex: 1; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pcard.active .pcard-name { color: var(--text); }
.pcard-meta { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--text3); letter-spacing: 0.03em; }
.pcard-del { font-size: 14px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 0 2px; line-height: 1; transition: color 0.12s; flex-shrink: 0; }
.pcard-del:hover { color: var(--text2); }
.pcard-play { width: 36px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-left: 0.5px solid var(--border); color: var(--text3); font-size: 11px; transition: color 0.12s, background 0.12s; cursor: pointer; background: none; border-top: none; border-right: none; border-bottom: none; }
.pcard-lottie { width: 32px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-left: 0.5px solid var(--border); color: var(--text3); font-size: 9px; font-family: 'DM Mono', monospace; letter-spacing: 0.03em; transition: color 0.12s, background 0.12s; cursor: pointer; background: none; border-top: none; border-right: none; border-bottom: none; text-align: center; line-height: 1.3; }
.pcard-lottie:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.pcard-seq-label { padding: 6px 6px 2px; font-size: 9px; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; }
.pcard-play:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.pcard-play.playing { color: var(--accent); }





/* Canvas area */
#main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); position: relative; overflow: hidden; }
#canvas-wrap { position: relative; transition: background 0.4s; }
#canvas-wrap.bg-dark  { background: #0e0e0f; }
#canvas-wrap.bg-mid   { background: #1e1e20; }
#canvas-wrap.bg-light { background: #f0f0ec; }
#canvas-wrap.bg-white { background: #ffffff; }
canvas { display: block; }




/* Preset modal */
#pmodal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); align-items: center; justify-content: center; }
#pmodal-box { background: #141415; border: 0.5px solid rgba(255,255,255,0.12); border-radius: 12px; width: 400px; max-width: 96vw; display: flex; flex-direction: column; overflow: hidden; }
#pmodal-head { display: flex; align-items: center; gap: 9px; padding: 12px 14px; border-bottom: 0.5px solid rgba(255,255,255,0.07); }
#pmodal-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
#pmodal-name { flex: 1; background: transparent; border: none; outline: none; font-family: 'DM Mono', monospace; font-size: 12px; color: #e8e8e4; }
#pmodal-close { background: none; border: none; color: #555; font-size: 20px; cursor: pointer; line-height: 1; padding: 0 2px; }
#pmodal-close:hover { color: var(--text2); }
#pmodal-preview { display: flex; align-items: center; justify-content: center; padding: 16px; }
#pmodal-canvas { max-width: 100%; max-height: 260px; display: block; border-radius: 4px; }
#pmodal-meta { padding: 8px 14px; font-size: 10px; font-family: 'DM Mono', monospace; color: #444442; letter-spacing: 0.05em; line-height: 1.8; border-top: 0.5px solid rgba(255,255,255,0.07); }
#pmodal-actions { display: flex; gap: 6px; padding: 10px 14px; border-top: 0.5px solid rgba(255,255,255,0.07); }
#pmodal-actions .export-btn { margin: 0; flex: 1; padding: 8px; }
.anim-group-head { display:flex; align-items:center; justify-content:space-between; cursor:pointer; user-select:none; padding:5px 0 3px; font-size:10px; color:var(--text3); font-family:'DM Mono',monospace; letter-spacing:0.05em; }
.anim-group-head:hover { color:var(--text2); }
.anim-group-arrow { font-size:8px; transition:transform 0.2s; }
.anim-group-body { overflow:hidden; transition:max-height 0.25s ease; }

/* ── Demo Overlay ── */
#demo-overlay {
  display: none; position: fixed; inset: 0; z-index: 9999;
  align-items: center; justify-content: center;
  background: linear-gradient(145deg, #d8daea 0%, #cccfe0 35%, #c0c3d8 65%, #b8bdd4 100%);
}
.demo-card {
  width: 360px; min-height: 620px;
  background: rgba(172,176,196,0.52);
  backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
  border: 1px solid rgba(255,255,255,0.30);
  border-radius: 30px;
  padding: 36px 24px 28px;
  display: flex; flex-direction: column; align-items: center;
  box-shadow: 0 20px 60px rgba(80,85,120,0.18);
  position: relative;
  gap: 0;
}
.demo-status {
  color: rgba(255,255,255,0.92);
  font-size: 22px; font-weight: 500; letter-spacing: 0.01em;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  width: 100%; text-align: center;
  min-height: 32px; margin-bottom: 24px;
}
.demo-canvas-wrap {
  width: 240px; height: 240px; flex-shrink: 0;
  margin-bottom: 28px;
  display: flex; align-items: center; justify-content: center;
}
#demo-canvas { width: 240px; height: 240px; display: block; }
.demo-bubble-area {
  width: 100%; flex: 1;
  display: flex; align-items: flex-end;
  min-height: 100px;
}
.demo-bubble {
  background: rgba(255,255,255,0.93);
  border-radius: 20px;
  padding: 14px 18px;
  font-size: 14px; line-height: 1.65; color: #111;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  opacity: 0; transform: translateY(12px);
  transition: opacity 0.4s ease, transform 0.4s ease;
  max-width: 90%;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.demo-bubble.visible { opacity: 1; transform: translateY(0); }
.demo-close {
  position: absolute; bottom: 18px; right: 18px;
  width: 34px; height: 34px; border-radius: 10px;
  background: rgba(255,255,255,0.22); border: 1px solid rgba(255,255,255,0.35);
  color: rgba(255,255,255,0.85); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s; font-family: inherit;
}
.demo-close:hover { background: rgba(255,255,255,0.35); }
.demo-open-btn {
  display: block; width: 100%; margin-top: 10px;
  padding: 9px 0; border-radius: 8px;
  background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.72); font-size: 12px; letter-spacing: 0.07em;
  font-family: 'DM Mono', monospace; cursor: pointer; text-align: center;
  transition: background 0.2s, color 0.2s;
}
.demo-open-btn:hover { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.95); }
</style>
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.10.1/dist/ffmpeg.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body>

<aside id="sidebar">
  <div id="sidebar-brand">
    <h1>Star Field</h1>
    <p>generative · europa</p>
  </div>
  <div id="sidebar-tabs">
    <button class="stab on" onclick="switchTab('editor')">✏ Editor</button>
    <button class="stab"    onclick="switchTab('presets')">⊞ Presets</button>
    <button class="stab"    onclick="switchTab('phone')">▭ Phone</button>
  </div>

  <!-- EDITOR TAB -->
  <div id="tab-editor">
    <div id="editor-save-area" style="padding:8px 14px;border-bottom:0.5px solid var(--border);flex-shrink:0">
      <div style="display:flex;gap:6px">
        <button class="export-btn" id="editor-save-btn" style="margin:0;flex:1;padding:9px;border-color:var(--accent);color:var(--text);background:rgba(200,200,192,0.07);letter-spacing:0.06em;font-size:11px" onclick="showEditorSaveInput()">+ Save preset</button>
        <button class="export-btn" title="Reset to defaults" style="margin:0;padding:9px 11px;width:auto;color:var(--text3)" onclick="resetToDefaults()">↺</button>
      </div>
      <div id="editor-save-form" style="display:none;margin-top:6px;display:none;flex-direction:column;gap:5px">
        <input id="editor-save-name" type="text" placeholder="preset name…"
          style="background:transparent;border:0.5px solid var(--border2);border-radius:6px;padding:7px 9px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;outline:none;"
          onkeydown="if(event.key==='Enter')confirmEditorSave();if(event.key==='Escape')hideEditorSaveInput()">
        <div style="display:flex;gap:5px">
          <button class="export-btn" style="margin:0;flex:1;padding:7px" onclick="confirmEditorSave()">Save</button>
          <button class="export-btn" style="margin:0;padding:7px 10px;width:auto" onclick="hideEditorSaveInput()">✕</button>
        </div>
      </div>
    </div>
    <div id="sidebar-scroll">

      <div class="section">
        <div class="section-head">Format</div>
        <div class="section-body">
          <div class="pill-row" id="fmtBtns">
            <button class="pill on" onclick="setFmt('sq',event)">1:1</button>
            <button class="pill"    onclick="setFmt('wide',event)">16:9</button>
            <button class="pill"    onclick="setFmt('tall',event)">9:16</button>
            <button class="pill"    onclick="setFmt('wide3',event)">3:1</button>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-head">Background</div>
        <div class="section-body">
          <div class="pill-row" id="bgBtns">
            <button class="pill on" onclick="setBg('bg-dark',event)">Black</button>
            <button class="pill"    onclick="setBg('bg-mid',event)">Dark</button>
            <button class="pill"    onclick="setBg('bg-light',event)">Light</button>
            <button class="pill"    onclick="setBg('bg-white',event)">White</button>
          </div>
        </div>
      </div>



      <div class="section">
        <div class="section-head">Animation</div>
        <div class="section-body">
          <!-- FIELD group -->
          <div>
            <div class="anim-group-head" onclick="toggleAnimGroup('field')">
              <span>FIELD</span><span class="anim-group-arrow" id="arrow-field">▶</span>
            </div>
            <div class="anim-group-body" id="group-field" style="max-height:0">
              <div class="pill-row" id="animBtns" style="padding-bottom:4px">
                <button class="pill"    onclick="setAnim('organic')">Organic</button>
                <button class="pill"    onclick="setAnim('pulse')">Pulse</button>
                <button class="pill on" onclick="setAnim('spin')">Spin</button>
                <button class="pill"    onclick="setAnim('drift')">Drift</button>
                <button class="pill"    onclick="setAnim('wave')">Wave</button>
                <button class="pill"    onclick="setAnim('speaker')">Speaker</button>
                <button class="pill"    onclick="setAnim('echo')">Echo</button>
                <button class="pill"    onclick="setAnim('ring')">Ring</button>
              </div>
              <div style="padding-top:8px;display:flex;flex-wrap:wrap;gap:5px;padding-bottom:6px">
                <button class="pill" id="stabilizeBtn" onclick="toggleStabilize()" title="Lock rotation">🔒 Rotation</button>
                <button class="pill" id="stabilizePosBtn" onclick="toggleStabilizePos()" title="Lock position">🔒 Position</button>
                <button class="pill" id="fixAxisBtn" onclick="toggleFixAxis()" title="Fix axis upward">🔒 Axis</button>
                <button class="pill" id="fixSizeBtn" onclick="toggleFixSize()" title="Lock star size">🔒 Size</button>
              </div>
            </div>
          </div>

          <!-- TRIO group (3-star loaders) -->
          <div style="border-top:0.5px solid var(--border2)">
            <div class="anim-group-head" onclick="toggleAnimGroup('trio')">
              <span>TRIO</span><span class="anim-group-arrow" id="arrow-trio">▶</span>
            </div>
            <div class="anim-group-body" id="group-trio" style="max-height:0">
              <div class="pill-row" id="trioAnimBtns" style="padding-bottom:6px">
                <button class="pill" onclick="setAnim('mini-trio-bounce')">Bounce</button>
                <button class="pill" onclick="setAnim('mini-trio-wave')">Wave</button>
                <button class="pill" onclick="setAnim('mini-trio-fade')">Fade</button>
                <button class="pill" onclick="setAnim('mini-trio-orbit')">Orbit</button>
                <button class="pill" onclick="setAnim('mini-trio-triangle')">Triangle</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-head">Motion</div>
        <div class="section-body">
          <div class="ctrl">
            <label>Speed</label>
            <input type="range" min="1" max="30" step="1" value="10" id="speedSlider">
            <span class="val" id="speedVal">1.0×</span>
          </div>
          <div class="ctrl">
            <label>Amp</label>
            <input type="range" min="0" max="30" step="1" value="13" id="ampSlider">
            <span class="val" id="ampVal">13</span>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-head">Stars</div>
        <div class="section-body">
          <div class="ctrl">
            <label>Count</label>
            <input type="range" min="3" max="12" step="1" value="12" id="countSlider">
            <span class="val" id="countVal">12</span>
          </div>
          <div class="ctrl">
            <label>Size</label>
            <input type="range" min="4" max="28" step="1" value="11" id="sizeSlider">
            <span class="val" id="sizeVal">11</span>
          </div>
          <div class="ctrl">
            <label>Radius</label>
            <input type="range" min="20" max="160" step="1" value="88" id="radiusSlider">
            <span class="val" id="radiusVal">88</span>
          </div>
          <div class="ctrl" style="display:none">
            <label>Sharpness</label>
            <input type="range" min="20" max="70" step="1" value="42" id="innerSlider">
            <span class="val" id="innerVal">0.42</span>
          </div>
          <div class="ctrl">
            <label>Opacity</label>
            <input type="range" min="5" max="100" step="1" value="45" id="opSlider">
            <span class="val" id="opVal">0.45</span>
          </div>
          <div class="ctrl">
            <label>Pulzálás</label>
            <input type="range" min="0" max="20" step="1" value="8" id="pulseSlider">
            <span class="val" id="pulseVal">0.8</span>
          </div>
          <div class="ctrl">
            <label>Forgás erő</label>
            <input type="range" min="0" max="20" step="1" value="4" id="spinSlider">
            <span class="val" id="spinVal">0.4</span>
          </div>
          <div class="ctrl">
            <label>Tengely pulzus</label>
            <input type="range" min="0" max="100" step="1" value="0" id="axisPullSlider">
            <span class="val" id="axisPullVal">0.00</span>
          </div>
          <div class="ctrl" style="align-items:center">
            <label>Minden Nth</label>
            <div class="pill-row" id="axisNthBtns" style="flex:1;justify-content:flex-start;gap:4px">
              <button class="pill on" data-nth="2" onclick="setAxisNth(2,event)">2.</button>
              <button class="pill"    data-nth="3" onclick="setAxisNth(3,event)">3.</button>
              <button class="pill"    data-nth="4" onclick="setAxisNth(4,event)">4.</button>
              <button class="pill"    data-nth="5" onclick="setAxisNth(5,event)">5.</button>
            </div>
          </div>

        </div>
      </div>

      <div class="section">
        <div class="section-head">Overlay</div>
        <div class="section-body">
          <div class="pill-row">
            <button class="pill" id="axisBtn" onclick="toggleAxis()">X-Y axis</button>
          </div>

// ── Axis ──
function drawAxis() {
  const p=palette[colorKey]; const axisA=0.25,tickLen=4,tickStep=40;
  ct.save(); ct.strokeStyle=`rgba(${p.r},${p.g},${p.b},${axisA})`; ct.lineWidth=0.5; ct.setLineDash([4,6]);

  ct.textAlign='left';

}

function loop() {
  // Fill background (so export matches screen)
  const bgFill = {'bg-dark':'#0e0e0f','bg-mid':'#1e1e20','bg-light':'#f0f0ec','bg-white':'#ffffff'};
  ct.fillStyle = bgFill[bgClass] || '#0e0e0f';
  ct.fillRect(0, 0, W, H);

  t += 0.016 * (speedMult || 1);

  tickPlayback();
  if (seqActive && !playbackActive) tickSeqHold();
  if (demoActive) demoTick();
  if (playbackActive && playbackBlend < 1) {
    const eb = easeInOut(Math.max(0, Math.min(1, playbackBlend)));
    drawOrbitPositionMorph(eb);
  } else {
    drawAnimStyle(currentAnim, 1);
  }

  if (showAxis) drawAxis();
  requestAnimationFrame(loop);
}

function lerpAngle(a, b, t) { let d=b-a; while(d>Math.PI)d-=Math.PI*2; while(d<-Math.PI)d+=Math.PI*2; return a+d*t; }
const ORBIT_STYLES = new Set(['organic','pulse','spin','drift','wave','speaker','echo','ring','solo-circle','solo-dots','solo-fade','mini-ccw','mini-ellipse','mini-duo','mini-figure8','mini-float','mini-bounce','mini-breathe','mini-blink','mini-beat','mini-arc','mini-arc-wide','mini-sweep','mini-ring','mini-chase','mini-ripple','mini-ping','mini-ring-out','mini-fill-ring','mini-trio-bounce','mini-trio-wave','mini-trio-fade','mini-trio-orbit','mini-trio-triangle']);
function isOrbitStyle(s) { return ORBIT_STYLES.has(s); }

function computeToParams(i) {

  const savedStyle = animStyleForGetParams;
  const s = playbackToSettings || {};
  const toCount = Math.round(s.starCount ?? starCount);

  if (i >= toCount) {
    const from = (starMorphFromPos && starMorphFromPos[i]) ? starMorphFromPos[i] : {x:CX, y:CY, rot:0, sz:sv.baseSize, fa:0};
    return {...from, fa: 0, sz: 0};
  }
  starCount = toCount; baseSize = s.baseSize ?? baseSize;
  orbitRadius = s.orbitRadius ?? orbitRadius; innerRatio = s.innerRatio ?? innerRatio;
  opacity = s.opacity ?? opacity; movementAmp = s.movementAmp ?? movementAmp;
  pulseAmt = s.pulseAmt ?? pulseAmt; spinAmt = s.spinAmt ?? spinAmt;
  axisPull = s.axisPull ?? axisPull;
  animStyleForGetParams = playbackToAnim || 'spin';
  const p = getStarParams(i, 1.0);
  starCount=sv.starCount; baseSize=sv.baseSize; orbitRadius=sv.orbitRadius; innerRatio=sv.innerRatio;
  opacity=sv.opacity; movementAmp=sv.movementAmp; pulseAmt=sv.pulseAmt; spinAmt=sv.spinAmt; axisPull=sv.axisPull;
  animStyleForGetParams=savedStyle;

}
// Live FROM params — computes star i using playbackFromSettings at current t
function computeFromParams(i) {

function drawStar(x, y, ro, ri, rot, fillA, strokeA, sw) {

function easeInOut(t) { return t<0.5 ? 2*t*t : -1+(4-2*t)*t; }

function starPos(i, r, n) {
  const a = (i/n)*Math.PI*2 - Math.PI/2;
  const ri = getAxisPullRadius(i, r);
  return { x: CX + Math.cos(a)*ri, y: CY + Math.sin(a)*ri };
}

function getAxisPullRadius(i, r) {
  if (axisPull <= 0 || axisNth < 2) return r;
  if (i % axisNth !== axisNth - 1) return r;
  const pulse = Math.sin(t * 1.8 * (speedMult || 1) + i * 0.9) * 0.5 + 0.5;
  return r * (1 - axisPull * pulse);
}

let animStyleForGetParams = 'spin';

function getStarParams(i, eb) {
  const noise = noiseBase[i % noiseBase.length];

  const base = starPos(i, orbitRadius, starCount);
  const amp = movementAmp;

      x   = CX + Math.cos(ang) * r;
      y   = CY + Math.sin(ang) * r;
      rot = fixAxis ? 0 : ang + t * spinAmt * 3;
      sz  = fixSize ? baseSize : baseSize * (1 + Math.sin(t*2.5)*0.18*pulseAmt);
      fa  = 0.65 + Math.sin(t*1.8)*0.2;
    } else if (style === 'solo-dots') {
      const scatter = Math.abs(Math.sin(t));
      const angle   = t * 0.28;
      x   = CX + Math.cos(angle) * orbitRadius * scatter;
      y   = CY + Math.sin(angle) * orbitRadius * scatter;
      rot = fixAxis ? 0 : t * spinAmt * 4;
      sz  = fixSize ? baseSize : baseSize * (0.65 + scatter * (0.5 + pulseAmt * 0.35));
      fa  = 0.25 + scatter * 0.6;
    } else { // solo-fade
      const pulse = Math.sin(t * 1.4) * 0.5 + 0.5;
      x   = CX; y = CY;
      rot = fixAxis ? 0 : t * spinAmt * 1.5;
      sz  = fixSize ? baseSize : baseSize * (0.3 + pulse * (1.4 + pulseAmt * 0.9));
      fa  = Math.max(0, 0.95 - pulse * 0.78);
    }
    return { x, y, rot, sz: Math.max(sz, 0.2), fa: Math.max(fa, 0) };
  }

  // ── Mini animations (1–2 stars) ──
  if (style === 'mini-ccw' || style === 'mini-ellipse' || style === 'mini-duo' ||
      style === 'mini-figure8' || style === 'mini-float' || style === 'mini-bounce' ||
      style === 'mini-breathe' || style === 'mini-blink' || style === 'mini-beat') {
    if (style === 'mini-duo' ? i > 1 : i > 0) return { x: CX, y: CY, rot: 0, sz: 0, fa: 0 };
    if (style === 'mini-ccw') {
      const ang = -t * 1.2;
      const r = getAxisPullRadius(0, orbitRadius);
      x = CX + Math.cos(ang) * r;
      y = CY + Math.sin(ang) * r;
      rot = fixAxis ? 0 : ang - t * spinAmt * 3;
      sz = fixSize ? baseSize : baseSize * (1 + Math.sin(t*2.5)*0.12*pulseAmt);
      fa = 0.65 + Math.sin(t*1.8)*0.2;
    } else if (style === 'mini-ellipse') {
      const ang = t * 1.0;
      const rx = getAxisPullRadius(0, orbitRadius) * 1.5;
      const ry = getAxisPullRadius(0, orbitRadius) * 0.42;
      x = CX + Math.cos(ang) * rx;
      y = CY + Math.sin(ang) * ry;
      rot = fixAxis ? 0 : t * spinAmt * 3;
      sz = fixSize ? baseSize : baseSize * (0.82 + Math.cos(ang)*0.22*pulseAmt);
      fa = 0.5 + Math.abs(Math.cos(ang)) * 0.3;
    } else if (style === 'mini-duo') {
      const ang = t * 1.2 + (i === 0 ? 0 : Math.PI);
      const r = getAxisPullRadius(i, orbitRadius);
      x = CX + Math.cos(ang) * r;
      y = CY + Math.sin(ang) * r;
      rot = fixAxis ? 0 : ang + t * spinAmt * (i === 0 ? 3 : -3);
      sz = fixSize ? baseSize : baseSize * (0.9 + Math.sin(t*2+i)*0.14*pulseAmt);
      fa = 0.55 + Math.sin(t*1.4+i)*0.2;
    } else if (style === 'mini-figure8') {
      const a = t * 0.9;
      x = CX + Math.sin(a) * orbitRadius;
      y = CY + Math.sin(2*a) * orbitRadius * 0.52;
      rot = fixAxis ? 0 : t * spinAmt * 2.5;
      sz = fixSize ? baseSize : baseSize * (0.88 + Math.sin(t*2)*0.16*pulseAmt);
      fa = 0.55 + Math.sin(t*1.4)*0.25;
    } else if (style === 'mini-float') {
      const a2 = movementAmp;
      x = CX + Math.sin(t*0.55)*a2*0.7 + Math.cos(t*0.31)*a2*0.35;
      y = CY + Math.cos(t*0.42)*a2*0.6 + Math.sin(t*0.27)*a2*0.28;
      rot = fixAxis ? 0 : t*spinAmt*0.8 + Math.sin(t*0.6)*0.5;
      sz = fixSize ? baseSize : baseSize*(0.88+Math.sin(t*0.7)*0.18*pulseAmt);
      fa = 0.5+Math.sin(t*0.5)*0.22;
    } else if (style === 'mini-bounce') {
      const ph = t * 1.7;
      const up = Math.abs(Math.sin(ph));
      x = CX + Math.sin(ph*0.5)*movementAmp*0.18;
      y = CY + movementAmp*0.3 - up*movementAmp*0.68;
      rot = fixAxis ? 0 : t*spinAmt*1.5;
      sz = fixSize ? baseSize : baseSize*(0.85 + up*(0.08 + pulseAmt*0.07));
      fa = 0.45+up*0.4;
    } else if (style === 'mini-breathe') {
      const pulse = Math.sin(t*0.75)*0.5+0.5;
      x = CX; y = CY;
      rot = fixAxis ? 0 : t*spinAmt*0.3;
      sz = fixSize ? baseSize : baseSize*(0.5 + pulse*(0.8+pulseAmt*0.9));
      fa = 0.2+pulse*0.65;
    } else if (style === 'mini-blink') {
      const on = Math.pow(Math.max(0,Math.sin(t*2.8)),10);
      x = CX; y = CY;
      rot = fixAxis ? 0 : t*spinAmt;
      sz = fixSize ? baseSize : baseSize*(0.9 + on*0.2*pulseAmt);
      fa = on*0.9;
    } else if (style === 'mini-arc') {
      // 3 stars in a tight 70° arc rotating together (like a spinning arc loader)
      if (i > 2) return { x: CX, y: CY, rot: 0, sz: 0, fa: 0 };
      const arcSpan = Math.PI * 0.38;
      const baseAng = t * 1.3;
      const ang = baseAng + (i - 1) * arcSpan;
      const r = orbitRadius;
      x = CX + Math.cos(ang) * r;
      y = CY + Math.sin(ang) * r;
      rot = fixAxis ? 0 : ang + t * spinAmt * 3;
      sz = fixSize ? baseSize : baseSize * (0.78 + (1 - Math.abs(i-1) * 0.4) * 0.28 * (0.5+pulseAmt*0.5));
      fa = 0.35 + (1 - Math.abs(i-1) * 0.38) * 0.52;
    } else if (style === 'mini-chase') {
      // 2 stars: bright leader + dim trailer (~60° behind) on same orbit
      if (i > 1) return { x: CX, y: CY, rot: 0, sz: 0, fa: 0 };
      const trail = 0.85;
      const ang = t * 1.5 - (i === 0 ? 0 : trail);
      const r = getAxisPullRadius(i, orbitRadius);
      x = CX + Math.cos(ang) * r;
      y = CY + Math.sin(ang) * r;
      rot = fixAxis ? 0 : ang + t * spinAmt * 3;
      sz = fixSize ? baseSize*(i===0?1:0.65) : baseSize*(i===0?1:0.65)*(1+Math.sin(t*2)*0.1*pulseAmt);
      fa = i === 0 ? (0.72 + Math.sin(t*1.8)*0.18) : (0.2 + Math.sin(t*1.8+trail)*0.1);
    } else if (style === 'mini-arc-wide') {
      // 4 stars in a 140° arc forming a wider spinner arm
      if (i > 3) return { x: CX, y: CY, rot: 0, sz: 0, fa: 0 };
      const arcSpan = Math.PI * 0.78;
      const baseAng = t * 1.1;
      const ang = baseAng + (i - 1.5) * (arcSpan / 3);
      const r = getAxisPullRadius(i, orbitRadius);
      x = CX + Math.cos(ang) * r;
      y = CY + Math.sin(ang) * r;
      rot = fixAxis ? 0 : ang + t * spinAmt * 3;
      const mid = 1.5 - Math.abs(i - 1.5); // 0→0, 1→1, 2→1, 3→0
      sz = fixSize ? baseSize*0.72 : baseSize*(0.62 + mid*0.14*(0.5+pulseAmt*0.3));
      fa = 0.18 + (0.28 + mid*0.22) * 0.85;
    } else if (style === 'mini-sweep') {
      // 6 stars in full ring, one bright spot sweeps CW (classic loading spinner)
      if (i > 5) return { x: CX, y: CY, rot: 0, sz: 0, fa: 0 };
      const ang = (i/6)*Math.PI*2 - Math.PI/2 + t * 1.6;
      const r = getAxisPullRadius(i, orbitRadius);
      x = CX + Math.cos(ang) * r;
      y = CY + Math.sin(ang) * r;
      rot = fixAxis ? 0 : ang + t * spinAmt * 2;
      // Brightness: the "leading" position (ang near current lead) is bright, trailing dims
      const lead = -Math.PI/2 + t * 1.6; // current lead position
      const delta = ((ang - lead + Math.PI*3) % (Math.PI*2)) - Math.PI; // -π to π
      const brightness = Math.max(0, 1 - Math.abs(delta) / (Math.PI * 0.7));
      sz = fixSize ? baseSize*0.62 : baseSize*(0.55+brightness*0.3*(0.5+pulseAmt*0.5));
      fa = 0.06 + brightness * 0.82;
    } else if (style === 'mini-ring') {
      // 5 stars equally spaced in full ring, all rotate together at same speed
      if (i > 4) return { x: CX, y: CY, rot: 0, sz: 0, fa: 0 };
      const ang = (i/5)*Math.PI*2 - Math.PI/2 + t * 1.2;
      const r = getAxisPullRadius(i, orbitRadius);
      x = CX + Math.cos(ang) * r;
      y = CY + Math.sin(ang) * r;
      rot = fixAxis ? 0 : ang + t * spinAmt * 2;
      sz = fixSize ? baseSize*0.65 : baseSize*(0.58+Math.sin(t*1.8+i)*0.1*pulseAmt);
      fa = 0.52 + Math.sin(t*1.2+i*(Math.PI*2/5))*0.18;
    } else if (style === 'mini-ripple') {
      // Filled star grows from center outward while fading (fill expands out)
      const cycle = (t * 0.9) % (Math.PI * 2);
      const prog = cycle / (Math.PI * 2);
      x = CX; y = CY;
      rot = fixAxis ? 0 : t * spinAmt;
      sz = fixSize ? baseSize : baseSize * (0.2 + prog * (3.8 + pulseAmt * 1.5));
      fa = Math.max(0, (1 - prog * 1.15) * 0.88);
    } else if (style === 'mini-ring-out') {
      // Star OUTLINE expands and fades (no fill) — expanding ring effect
      const cycle = (t * 0.9) % (Math.PI * 2);
      const prog = cycle / (Math.PI * 2);
      x = CX; y = CY;
      rot = fixAxis ? 0 : t * spinAmt * 0.3;
      sz = baseSize * (0.4 + prog * (4.5 + pulseAmt));
      fa = 0; // no fill — only stroke
      return { x, y, rot, sz: Math.max(sz, 0.3), fa: 0, strokeFa: Math.max(0, (1 - prog * 1.1) * 0.85) };
    } else if (style === 'mini-fill-ring') {
      // i=0: small filled star pulses; i=1: expanding ring outline around it
      if (i > 1) return { x: CX, y: CY, rot: 0, sz: 0, fa: 0 };
      if (i === 0) {
        const pulse = Math.sin(t * 1.1) * 0.5 + 0.5;
        x = CX; y = CY;
        rot = fixAxis ? 0 : t * spinAmt;
        sz = fixSize ? baseSize : baseSize * (0.65 + pulse * 0.35 * pulseAmt);
        fa = 0.55 + pulse * 0.3;
        return { x, y, rot, sz: Math.max(sz, 0.2), fa, strokeFa: 0 };
      } else {
        const cycle = (t * 0.95) % (Math.PI * 2);
        const prog = cycle / (Math.PI * 2);
        x = CX; y = CY;
        rot = fixAxis ? 0 : t * spinAmt * 0.2;
        sz = baseSize * (0.8 + prog * (3.8 + pulseAmt));
        return { x, y, rot, sz: Math.max(sz, 0.3), fa: 0, strokeFa: Math.max(0, (1 - prog * 1.1) * 0.72) };
      }
    } else if (style === 'mini-ping') {
      // Quick sharp pulse then long silence
      const cycle = (t * 1.1) % (Math.PI * 2);
      const pulse = Math.pow(Math.max(0, Math.sin(cycle)), 3);
      x = CX; y = CY;
      rot = fixAxis ? 0 : t * spinAmt * 0.5;
      sz = fixSize ? baseSize : baseSize * (0.35 + pulse * (2.2 + pulseAmt));
      fa = pulse * 0.92;
    } else if (style === 'mini-beat') {
      const ph = (t*1.8)%(Math.PI*2);
      const p1 = Math.max(0,Math.sin(ph*1.8))*0.85;
      const p2 = Math.max(0,Math.sin(ph*1.8-1.0))*0.55;
      const pulse = Math.max(p1,p2);
      x = CX; y = CY;
      rot = fixAxis ? 0 : t*spinAmt*0.5;
      sz = fixSize ? baseSize : baseSize*(0.72+pulse*(0.55+pulseAmt*0.5));
      fa = 0.28+pulse*0.65;
    }
    return { x, y, rot, sz: Math.max(sz||baseSize, 0.2), fa: Math.max(fa||0, 0) };
  }

  // ── Trio animations (3 stars) ──
  if (style.startsWith('mini-trio-')) {
    if (i > 2) return { x: CX, y: CY, rot: 0, sz: 0, fa: 0 };
    const sp = orbitRadius * 0.55;          // star spacing ← radius csúszka
    const stagger = (i-1) * (Math.PI*2/3);  // 120° phase offset
    if (style === 'mini-trio-bounce') {
      // Classic staggered bounce: stars in a row, each bounces up with offset timing
      const ph = t * 2.2 + i * 0.85;
      const h = movementAmp * 0.6;           // bounce height ← amp csúszka
      const up = -Math.abs(Math.sin(ph)) * h;
      x = CX + (i-1) * sp;
      y = CY + h*0.35 + up;                  // centered: resting pos below center
      rot = fixAxis ? 0 : t*spinAmt*2 + i;
      sz = fixSize ? baseSize : baseSize*(0.82 + Math.abs(Math.sin(ph))*0.1*(1+pulseAmt));
      fa = 0.38 + Math.abs(Math.sin(ph))*0.52;
    } else if (style === 'mini-trio-wave') {
      // Sine wave through the row — classic loading wave
      const wAmp = movementAmp*0.38 + orbitRadius*0.08;
      const ph = t * 1.9 + stagger;
      x = CX + (i-1) * sp;
      y = CY + Math.sin(ph) * wAmp;
      rot = fixAxis ? 0 : t*spinAmt + stagger*0.3;
      sz = fixSize ? baseSize : baseSize*(0.86 + Math.sin(ph)*0.14*pulseAmt);
      fa = 0.42 + (Math.sin(ph)*0.5+0.5)*0.42;
    } else if (style === 'mini-trio-fade') {
      // Sequential opacity: each star lights up after the other (typing indicator)
      const ph = t * 1.5 + stagger;
      const bright = Math.sin(ph)*0.5+0.5;
      x = CX + (i-1) * sp;
      y = CY;
      rot = 0;
      sz = fixSize ? baseSize : baseSize*(0.72 + bright*0.32*pulseAmt);
      fa = Math.max(0.07, bright) * 0.88;
    } else if (style === 'mini-trio-orbit') {
      // 3 stars equally spaced orbiting together
      const ang = t * 1.2 + stagger;
      const r = getAxisPullRadius(i, orbitRadius);
      x = CX + Math.cos(ang) * r;
      y = CY + Math.sin(ang) * r;
      rot = fixAxis ? 0 : ang + t*spinAmt*3;
      sz = fixSize ? baseSize : baseSize*(0.88 + Math.sin(t*2+i)*0.14*pulseAmt);
      fa = 0.52 + Math.sin(t*1.5+i*1.1)*0.22;
    } else if (style === 'mini-trio-triangle') {
      // 3 stars at triangle vertices rotating as a rigid formation
      const ang = t * 1.1 + stagger;
      const r = orbitRadius * 0.52;
      x = CX + Math.cos(ang) * r;
      y = CY + Math.sin(ang) * r;
      rot = fixAxis ? 0 : t*spinAmt*5 + stagger;
      sz = fixSize ? baseSize*0.82 : baseSize*(0.78 + Math.sin(t*2.2+i)*0.22*pulseAmt);
      fa = 0.5 + Math.sin(t*1.6+stagger)*0.28;
    }
    return { x, y, rot, sz: Math.max(sz||baseSize, 0.2), fa: Math.max(fa||0, 0) };
  }

  if (style === 'organic') {
    const ox = stabilizePos ? 0 : (Math.sin(t*noise.sp1+noise.ph1)*amp + Math.cos(t*noise.sp2*0.7+noise.ph2)*amp*0.45);
    const oy = stabilizePos ? 0 : (Math.cos(t*noise.sp2+noise.ph2)*amp + Math.sin(t*noise.sp3*0.6+noise.ph1)*amp*0.45);
    x = (base.x+ox)+(base.x-(base.x+ox))*spk;
    y = (base.y+oy)+(base.y-(base.y+oy))*spk;
    rot = stabilize ? noise.ph1 : (t*0.045+noise.ph1)*(1-spk)+(t*0.4+i*0.2)*spk;
    const pWave = Math.sin(t*0.8+i*0.6);
    const szO = fixSize ? baseSize : baseSize+pWave*1.8*pulseAmt;
    const szP = fixSize ? baseSize*1.2 : baseSize*1.2*(1+Math.sin(t*6+i*0.52)*0.22*pulseAmt);
    sz = szO+(szP-szO)*spk;
    const baseA = (0.26+Math.sin(t*0.6+i*0.4)*0.09)*(1-spk)+(0.55+Math.abs(Math.sin(t*5+i))*0.35)*spk;
    fa = baseA * (fixSize ? 1 : (1 + pWave * 0.45 * pulseAmt));
  } else if (style === 'pulse') {
    x = base.x; y = base.y;
    rot = stabilize ? i*(Math.PI*2/starCount) : t*0.3*(1+spinAmt)+i*(Math.PI*2/starCount);
    const pWave2 = Math.sin(t*4+i*(Math.PI*2/starCount));
    sz = fixSize ? baseSize : baseSize*(1+pWave2*0.3*(0.5+spk*0.5)*pulseAmt);
    fa = (0.3+Math.abs(Math.sin(t*3+i))*0.5) * (fixSize ? 1 : (1 + pWave2 * 0.5 * pulseAmt));
  } else if (style === 'spin') {
    const a2 = stabilizePos ? (i/starCount)*Math.PI*2-Math.PI/2 : (i/starCount)*Math.PI*2-Math.PI/2+t*(0.3+spk*0.7);
    const spinR = getAxisPullRadius(i, orbitRadius);
    x = CX+Math.cos(a2)*spinR; y = CY+Math.sin(a2)*spinR;
    rot = stabilize ? i*0.5 : t*1.2*(1+spinAmt)+i*0.5;
    const pWave3 = fixAxis ? Math.sin(t*1.8) : Math.sin(t*2+i); // sync pulse when axis locked
    sz = fixSize ? baseSize : baseSize+pWave3*2*pulseAmt;
    fa = (0.35+spk*0.3) * (fixSize ? 1 : (1 + pWave3 * 0.5 * pulseAmt));
  } else if (style === 'drift') {
    const ox2 = stabilizePos ? 0 : Math.sin(t*noise.sp1*0.5+noise.ph1)*(amp+spk*8);
    const oy2 = stabilizePos ? 0 : Math.cos(t*noise.sp2*0.5+noise.ph2)*(amp+spk*8);
    x = base.x+ox2; y = base.y+oy2;
    rot = stabilize ? noise.ph1 : t*0.06+noise.ph1;
    const pWave4 = Math.sin(t*0.3+i);
    sz = fixSize ? baseSize : baseSize+pWave4*3*pulseAmt;
    fa = (0.2+Math.sin(t*0.4+i*0.5)*0.1+spk*0.25) * (fixSize ? 1 : (1 + pWave4 * 0.4 * pulseAmt));
  } else if (style === 'speaker') {
    // AI-speaker: 2 wave peaks travelling around a fixed orbit, drives size+opacity only (clean morph)
    const angle = (i / starCount) * Math.PI * 2 - Math.PI / 2;
    const travelPhase = angle * 2 - t * 2.0 * (speedMult || 1);
    const wave01 = Math.sin(travelPhase) * 0.5 + 0.5; // 0..1, no radial push
    x = CX + Math.cos(angle) * orbitRadius;
    y = CY + Math.sin(angle) * orbitRadius;
    rot = stabilize ? angle + Math.PI / 2 : angle + Math.PI / 2 + t * 0.06 * (spinAmt || 1);
    sz = fixSize ? baseSize : baseSize * (0.35 + wave01 * (0.55 + pulseAmt * 0.45));
    fa = 0.12 + wave01 * (0.75 + pulseAmt * 0.12);
  } else if (style === 'echo') {
    // Echo-style: 3 peaks, bigger size swing, subtle slow rotation
    const angle = (i / starCount) * Math.PI * 2 - Math.PI / 2;
    const travelPhase = angle * 3 - t * 1.6 * (speedMult || 1);
    const wave01 = Math.sin(travelPhase) * 0.5 + 0.5;
    const globalPulse = 1 + Math.sin(t * 0.6 * (speedMult || 1)) * 0.12 * movementAmp;
    x = CX + Math.cos(angle) * orbitRadius * globalPulse;
    y = CY + Math.sin(angle) * orbitRadius * globalPulse;
    rot = stabilize ? angle + Math.PI / 2 : angle + Math.PI / 2 + t * 0.12 * (spinAmt || 1);
    sz = fixSize ? baseSize : baseSize * (0.25 + wave01 * (0.85 + pulseAmt * 0.5));
    fa = 0.08 + wave01 * (0.88 + pulseAmt * 0.1);
  } else if (style === 'ring') {
    // Ring: all stars breathe softly in unison, gentle slow spin
    const angle = (i / starCount) * Math.PI * 2 - Math.PI / 2;
    const phaseOff = (i / starCount) * Math.PI; // half-wave stagger across ring
    const breathe = Math.sin(t * 1.1 * (speedMult || 1) + phaseOff) * 0.5 + 0.5;
    const r = orbitRadius * (0.88 + breathe * 0.18 * movementAmp);
    x = CX + Math.cos(angle + t * 0.18 * (spinAmt || 1)) * r;
    y = CY + Math.sin(angle + t * 0.18 * (spinAmt || 1)) * r;
    rot = angle + Math.PI / 2 + t * 0.18 * (spinAmt || 1);
    sz = fixSize ? baseSize : baseSize * (0.6 + breathe * (0.55 + pulseAmt * 0.3));
    fa = 0.2 + breathe * (0.7 + pulseAmt * 0.08);
  } else { // wave
    const wave = Math.sin(t*1.5+i*(Math.PI*2/starCount)*2)*amp;
    x = base.x+Math.cos((i/starCount)*Math.PI*2)*wave*0.3;
    y = base.y+Math.sin(t*2+i*0.5)*wave;
    rot = t*0.2+i*0.3+spk*t*0.5;
    const pWave5 = Math.sin(t*3+i);
    sz = fixSize ? baseSize : baseSize*(0.8+pWave5*0.4*pulseAmt);
    fa = (0.25+Math.abs(Math.sin(t*2.5+i))*0.5) * (fixSize ? 1 : (1 + pWave5 * 0.45 * pulseAmt));
  }
  return { x, y, rot: fixAxis ? 0 : rot, sz, fa, ...(fixAxis ? {strokeFa: 0} : {}) };
}

function drawOrbitPositionMorph(eb) {
  const fromCount = Math.round((playbackFromSettings?.starCount) ?? starCount);
  const toCount   = Math.round((playbackToSettings?.starCount)   ?? starCount);
  const drawN     = Math.max(fromCount, toCount);

  for (let i = 0; i < drawN; i++) {
    // Live positions — both animations keep running during morph
    const from = computeFromParams(i);                      // null if i >= fromCount
    const to   = i < toCount ? computeToParams(i) : null;  // null if i >= toCount

    let x, y, rot, sz, fa;

    if (from && to) {
      // Star in both: straight position lerp (live, follows both animations)
      x   = lerp(from.x,   to.x,   eb);
      y   = lerp(from.y,   to.y,   eb);
      rot = lerpAngle(from.rot, to.rot, eb);
      sz  = lerp(from.sz,  to.sz,  eb);
      fa  = lerp(from.fa,  to.fa,  eb);

    } else if (from) {
      // Extra FROM star: flies toward nearest TO star, shrinks out
      const target = computeToParams(i % toCount);
      x   = lerp(from.x,  target.x, eb);
      y   = lerp(from.y,  target.y, eb);
      rot = lerpAngle(from.rot, target.rot, eb);
      sz  = lerp(from.sz, 0, eb);
      fa  = lerp(from.fa, 0, eb);

    } else if (to) {
      // New TO star: emerges from nearest FROM star position
      const source = computeFromParams(i % fromCount);
      x   = lerp(source.x,   to.x,   eb);
      y   = lerp(source.y,   to.y,   eb);
      rot = lerpAngle(source.rot, to.rot, eb);
      sz  = lerp(0,        to.sz,  eb);
      fa  = lerp(0,        to.fa,  eb);

    } else continue;

    if (sz > 0.3) drawStar(x, y, sz, sz * innerRatio, fixAxis ? 0 : rot, fa, 0, 0.9);
    starCurrentPos[i] = {x, y, rot, sz, fa};
  }
}

function drawAnimStyle(style,eb) {
  {
    const p=palette[colorKey];
    const isMini=style.startsWith('solo-')||style.startsWith('mini-'); const isTrio=style.startsWith('mini-trio-');
    const _dn={'mini-arc':3,'mini-arc-wide':4,'mini-sweep':6,'mini-ring':5,'mini-chase':2,'mini-duo':2,'mini-fill-ring':2,'mini-trio-bounce':3,'mini-trio-wave':3,'mini-trio-fade':3,'mini-trio-orbit':3,'mini-trio-triangle':3};
    const drawN=isMini?(_dn[style]||1):starCount;
    const saved=animStyleForGetParams; animStyleForGetParams=style;
    for(let i=0;i<drawN;i++){const params=getStarParams(i,eb);starCurrentPos[i]=params;const sA=params.strokeFa!==undefined?params.strokeFa:0.35+eb*0.25;drawStar(params.x,params.y,params.sz,params.sz*innerRatio,params.rot,params.fa,sA,0.9);}
    animStyleForGetParams=saved;
  }
}

// ── Export ──

function exportLottie() {

  const isSoloAnim = currentAnim.startsWith('solo-') || currentAnim.startsWith('mini-');
  const fps = 30;
  const durEl = document.getElementById('durSlider');
  const durationSec = durEl ? parseInt(durEl.value) : 5;
  const totalFrames = fps * durationSec;
  // t advances 0.016*speedMult per canvas tick (~60fps); Lottie is 30fps → 2 ticks per frame
  const tStep = 0.016 * (speedMult || 1) * 2;

  // ── Bake animation ──
  const savedT = t;
  const _miniEC={'mini-sweep':6,'mini-ring':5,'mini-arc':3,'mini-arc-wide':4,'mini-trio-bounce':3,'mini-trio-wave':3,'mini-trio-fade':3,'mini-trio-orbit':3,'mini-trio-triangle':3,'mini-duo':2,'mini-chase':2,'mini-fill-ring':2};
  const exportCount = isSoloAnim ? (_miniEC[currentAnim]||1) : starCount;
  const starData = Array.from({length: exportCount}, () => []);

  const KF_STEP = 2; // sample every 2nd frame → halves keyframe count
  for (let f = 0; f < totalFrames; f += KF_STEP) {
    t = savedT + f * tStep;
    const savedStyle = animStyleForGetParams;
    animStyleForGetParams = currentAnim;
    for (let i = 0; i < exportCount; i++) {
      const p = getStarParams(i, 1.0);
      starData[i].push({
        frame: f,
        x: p.x,
        y: p.y,
        rot: (p.rot || 0) * 180 / Math.PI,          // radians → degrees
        sz:  Math.max(0.1, p.sz),
        // match canvas rendering: fa * opacity/0.45, clamped 0–100
        op: Math.min(100, Math.max(0, p.fa * opacity / 0.45 * 100))
      });
    }
    animStyleForGetParams = savedStyle;
  }
  t = savedT;

  // ── Build Lottie layers ──
  const pal = palette[colorKey];
  const fillC = [pal.r/255, pal.g/255, pal.b/255, 1];
  const bgHex = {'bg-dark':'#0e0e0f','bg-mid':'#1e1e20','bg-light':'#f0f0ec','bg-white':'#ffffff'};

  // Helper: keyframes array for a multi-value prop (position/scale)
  // Uses d.frame for absolute time; ease-in-out handles for smooth interpolation
  function vecKF(frames, getter) {
    return frames.map((d, idx) => {
      const kf = {t: d.frame ?? idx, s: getter(d)};
      if (idx < frames.length - 1) { kf.i = {x:[0.5],y:[0.5]}; kf.o = {x:[0.5],y:[0.5]}; }
      return kf;
    });
  }
  // Helper: keyframes for scalar prop (rotation/opacity)
  function scalarKF(frames, getter) {
    return frames.map((d, idx) => {
      const kf = {t: d.frame ?? idx, s: [getter(d)]};
      if (idx < frames.length - 1) { kf.i = {x:[0.5],y:[0.5]}; kf.o = {x:[0.5],y:[0.5]}; }
      return kf;
    });
  }

  const layers = [];

  for (let i = 0; i < exportCount; i++) {
    const data = starData[i];
    // Average size → shape template outer radius
    const avgSz = data.reduce((s,d) => s+d.sz, 0) / data.length;

    layers.push({
      ddd: 0, ind: i+1, ty: 4, nm: `Star ${i+1}`, sr: 1,
      ks: {
        o: {a:1, k: scalarKF(data, d => Math.round(d.op))},
        r: {a:1, k: scalarKF(data, d => d.rot)},
        p: {a:1, k: vecKF(data,   d => [d.x, d.y, 0])},
        a: {a:0, k: [0,0,0]},
        s: {a:1, k: vecKF(data,   d => [d.sz/avgSz*100, d.sz/avgSz*100, 100])}
      },
      ao: 0,
      shapes: [{
        ty: 'gr', nm: 'star', it: [
          {
            ty: 'sh', nm: 'star',
            ks: {a:0, k:{v:STAR21_V.map(([x,y])=>[x*avgSz/50,y*avgSz/50]),
                          i:STAR21_I.map(([x,y])=>[x*avgSz/50,y*avgSz/50]),
                          o:STAR21_O.map(([x,y])=>[x*avgSz/50,y*avgSz/50]),c:true}}
          },
          {ty:'fl', nm:'fill', o:{a:0,k:100}, c:{a:0,k:fillC}, r:1},
          {ty:'tr', p:{a:0,k:[0,0]}, a:{a:0,k:[0,0]}, s:{a:0,k:[100,100]},
           r:{a:0,k:0}, o:{a:0,k:100}, sk:{a:0,k:0}, sa:{a:0,k:0}}
        ]
      }],
      ip: 0, op: totalFrames, st: 0, bm: 0
    });
  }

  // Background solid
  layers.push({
    ddd:0, ind: starCount+1, ty:1, nm:'Background', sr:1,
    ks:{
      o:{a:0,k:100}, r:{a:0,k:0},
      p:{a:0,k:[W/2,H/2,0]}, a:{a:0,k:[W/2,H/2,0]}, s:{a:0,k:[100,100,100]}
    },
    ao:0, sw:W, sh:H, sc: bgHex[bgClass]||'#0e0e0f',
    ip:0, op:totalFrames, st:0, bm:0
  });

  const lottie = {
    v: '5.7.4', fr: fps, ip: 0, op: totalFrames, w: W, h: H,
    nm: `Star Field – ${currentAnim}`, ddd: 0, assets: [], layers
  };

  const json = JSON.stringify(lottie);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `star-field-${fmt}-${colorKey}-${currentAnim}-${durationSec}s.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

let recDuration=5;

let ffmpegLoaded = false;
let ffmpegInst = null;

async function getFFmpeg() {
  if (ffmpegLoaded) return ffmpegInst;
  const { createFFmpeg } = FFmpeg;
  ffmpegInst = createFFmpeg({ log: false, corePath: 'https://unpkg.com/@ffmpeg/core@0.10.0/dist/ffmpeg-core.js' });
  await ffmpegInst.load();
  ffmpegLoaded = true;
  return ffmpegInst;
}

async function exportMP4() {
  if (!window.MediaRecorder) { alert('MediaRecorder not supported.'); return; }
  if (typeof cv.captureStream !== 'function') { alert('captureStream not available.'); return; }

  const btn = document.getElementById('mp4Btn');
  const prog = document.getElementById('rec-progress');
  const bar  = document.getElementById('rec-bar');
  const lbl  = document.getElementById('rec-label');

  const mimeType = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'].find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';

  // Phase 1: record
  btn.textContent = '● Recording...'; btn.style.pointerEvents = 'none'; prog.style.display = '';
  lbl.textContent = '0%'; bar.style.width = '0%';

  const chunks = [];
  let stream;
  try { stream = cv.captureStream(30); }
  catch(e) { alert('captureStream error: ' + e.message); btn.textContent='↓ Export MP4'; btn.style.pointerEvents=''; prog.style.display='none'; return; }

  const rec = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 10_000_000 });
  rec.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };

  await new Promise(resolve => {
    rec.onstop = resolve;
    rec.start(200);
    const startMs = performance.now(), totalMs = recDuration * 1000;
    function tick() {
      const el = performance.now() - startMs;
      const pct = Math.min(100, (el / totalMs) * 100);
      bar.style.width = pct.toFixed(1) + '%';
      lbl.textContent = Math.round(pct) + '%';
      if (el < totalMs) requestAnimationFrame(tick); else rec.stop();
    }
    requestAnimationFrame(tick);
  });

  if (chunks.length === 0) { alert('Recording failed.'); btn.textContent='↓ Export MP4'; btn.style.pointerEvents=''; prog.style.display='none'; return; }

  // Phase 2: convert to MP4
  btn.textContent = '⚙ Converting...';
  lbl.textContent = 'Loading FFmpeg…'; bar.style.width = '10%';

  try {
    const ff = await getFFmpeg();
    const { fetchFile } = FFmpeg;
    const webmBlob = new Blob(chunks, { type: mimeType });

    lbl.textContent = 'Converting…'; bar.style.width = '50%';
    ff.FS('writeFile', 'input.webm', await fetchFile(webmBlob));
    await ff.run('-i', 'input.webm', '-an', '-c:v', 'libx264', '-preset', 'fast', '-crf', '20', '-pix_fmt', 'yuv420p', '-movflags', '+faststart', 'output.mp4');

    bar.style.width = '90%'; lbl.textContent = 'Saving…';
    const data = ff.FS('readFile', 'output.mp4');
    const mp4Blob = new Blob([data.buffer], { type: 'video/mp4' });
    const url = URL.createObjectURL(mp4Blob);
    const a = document.createElement('a');
    a.href = url; a.download = `star-field-${fmt}-${colorKey}-${recDuration}s.mp4`; a.style.display = 'none';
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);

    // cleanup
    ff.FS('unlink', 'input.webm'); ff.FS('unlink', 'output.mp4');
  } catch(e) {
    alert('Conversion error: ' + e.message);
  }

  btn.textContent = '↓ Export MP4'; btn.style.pointerEvents = ''; prog.style.display = 'none'; bar.style.width = '0%';
}

let phoneMode = false;
let phoneAnimFrame = null;

function switchTab(tab) {
  const isEditor  = tab === 'editor';
  const isPhone   = tab === 'phone';
  const isPresets = tab === 'presets' || isPhone;
  document.getElementById('tab-editor').style.display   = isEditor  ? 'flex'  : 'none';
  document.getElementById('tab-presets').style.display  = isPresets ? 'flex'  : 'none';
  document.getElementById('normal-view').style.display  = isPhone   ? 'none'  : 'flex';
  document.getElementById('phone-view').style.display   = isPhone   ? 'flex'  : 'none';
  document.querySelectorAll('.stab').forEach(b => b.classList.toggle('on', b.textContent.toLowerCase() === tab));
  phoneMode = isPhone;
  if (isPhone) { setTimeout(setupPhonePreview, 50); }
  else { stopPhoneLoop(); }
  if (isPresets) renderPresets();
}

function setupPhonePreview() {
  const view  = document.getElementById('phone-view');
  const shell = document.getElementById('iphone-shell');
  const svg   = document.getElementById('iphone-svg');
  const pc    = document.getElementById('phone-canvas');
  // SVG viewBox 390x844, screen area x=16 y=52 w=358 h=740
  const availW = Math.min(view.clientWidth  - 40, 260);
  const availH = Math.min(view.clientHeight - 40, 560);
  const scale  = Math.min(availW / 390, availH / 844);
  const pW = 390 * scale, pH = 844 * scale;
  shell.style.width  = pW + 'px';
  shell.style.height = pH + 'px';
  svg.style.width  = pW + 'px';
  svg.style.height = pH + 'px';
  const cL = Math.round(16 * scale), cT = Math.round(52 * scale);
  const cW = Math.round(358 * scale), cH = Math.round(740 * scale);
  pc.style.left = cL + 'px'; pc.style.top = cT + 'px';
  pc.style.width = cW + 'px'; pc.style.height = cH + 'px';
  pc.width = cW; pc.height = cH;
  startPhoneLoop(pc, cW, cH);
}

function startPhoneLoop(pc, cW, cH) {
  stopPhoneLoop();
  const pct = pc.getContext('2d');
  const bgMap = {'bg-dark':'#0e0e0f','bg-mid':'#1e1e20','bg-light':'#f0f0ec','bg-white':'#ffffff'};
  function frame() {
    if (!phoneMode) return;
    pct.fillStyle = bgMap[bgClass] || '#0e0e0f';
    pct.fillRect(0, 0, cW, cH);
    // Draw with correct aspect ratio (contain, centered)
    const srcW = cv.width, srcH = cv.height;
    const ratio = Math.min(cW / srcW, cH / srcH);
    const dw = srcW * ratio, dh = srcH * ratio;
    const dx = (cW - dw) / 2, dy = (cH - dh) / 2;
    pct.drawImage(cv, dx, dy, dw, dh);
    phoneAnimFrame = requestAnimationFrame(frame);
  }
  phoneAnimFrame = requestAnimationFrame(frame);
}

function stopPhoneLoop() {
  if (phoneAnimFrame) { cancelAnimationFrame(phoneAnimFrame); phoneAnimFrame = null; }
}

// Decompress a builtin preset's gzip+base64 payload → parsed JSON
async function decompressB64GZ(b64) {
  const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const ds = new DecompressionStream('gzip');
  const w = ds.writable.getWriter(); w.write(bytes); w.close();
  return JSON.parse(new TextDecoder().decode(await new Response(ds.readable).arrayBuffer()));
}

// Download a builtin lottie by id
async function downloadBuiltinLottie(id) {
  const entry = BUILTIN_LOTTIE.find(x => x.id === id); if (!entry) return;
  const data = await decompressB64GZ(entry.gz);
  const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = entry.name.replace(/\s+/g,'-') + '.json'; a.click();
}

  return { fmt, bgClass, colorKey, currentAnim, opacity, speedMult, movementAmp,

}

function applySettings(s) {
  fmt = s.fmt||'sq';
  applyFmt();
  document.querySelectorAll('#fmtBtns .pill').forEach(b=>{
    const m={'1:1':'sq','16:9':'wide','9:16':'tall','3:1':'wide3'};
    b.classList.toggle('on', m[b.textContent.trim()]===fmt);
  });
  bgClass = s.bgClass||'bg-dark';
  document.getElementById('canvas-wrap').className = bgClass;
  document.querySelectorAll('#bgBtns .pill').forEach(b=>{
    const m={'Fekete':'bg-dark','Sötét':'bg-mid','Világos':'bg-light','Fehér':'bg-white'};
    b.classList.toggle('on', m[b.textContent.trim()]===bgClass);
  });
  colorKey = s.colorKey||'gray';
  currentAnim = s.currentAnim || s.idleAnim || s.speakAnim || 'spin';
  document.querySelectorAll('#animBtns .pill').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===animLabel(currentAnim)));
  document.querySelectorAll('#trioAnimBtns .pill').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===animLabel(currentAnim)));
  function ss(id,valId,raw,fn){const el=document.getElementById(id),vl=document.getElementById(valId);if(!el)return;el.value=raw;vl.textContent=fn(raw);}
  opacity      = s.opacity??0.45;       ss('opSlider',    'opVal',    Math.round(opacity*100), v=>(v/100).toFixed(2));
  speedMult    = s.speedMult??1.0;      ss('speedSlider', 'speedVal', Math.round(speedMult*10),v=>(v/10).toFixed(1)+'×');
  movementAmp  = s.movementAmp??13;     ss('ampSlider',   'ampVal',   movementAmp,             v=>v);
  starCount    = s.starCount??12;       ss('countSlider', 'countVal', starCount,               v=>v);
  baseSize     = s.baseSize??11;        ss('sizeSlider',  'sizeVal',  baseSize,                v=>v);
  orbitRadius  = s.orbitRadius??88;     ss('radiusSlider','radiusVal',orbitRadius,             v=>v);
  innerRatio   = s.innerRatio??0.42;    ss('innerSlider', 'innerVal', Math.round(innerRatio*100),v=>(v/100).toFixed(2));
  pulseAmt     = s.pulseAmt??0.8;  ss('pulseSlider','pulseVal', Math.round(pulseAmt*10), v=>(v/10).toFixed(1));
  spinAmt      = s.spinAmt??0.4;   ss('spinSlider', 'spinVal',  Math.round(spinAmt*10),  v=>(v/10).toFixed(1));
  axisPull     = s.axisPull??0.0;  ss('axisPullSlider','axisPullVal', Math.round((s.axisPull??0)*100), v=>(v/100).toFixed(2));
  axisNth = s.axisNth ?? 2;
  document.querySelectorAll('#axisNthBtns .pill').forEach(b => b.classList.toggle('on', parseInt(b.dataset.nth) === axisNth));
  stabilize    = !!s.stabilize;    document.getElementById('stabilizeBtn')   .classList.toggle('on',stabilize);
  stabilizePos = !!s.stabilizePos; document.getElementById('stabilizePosBtn').classList.toggle('on',stabilizePos);
  fixAxis      = !!s.fixAxis;      document.getElementById('fixAxisBtn')     .classList.toggle('on',fixAxis);
  fixSize      = !!s.fixSize;      document.getElementById('fixSizeBtn')     .classList.toggle('on',fixSize);
  showAxis     = !!s.showAxis;     document.getElementById('axisBtn')        .classList.toggle('on',showAxis);
}

function resetToDefaults() {
  if (!confirm('Reset all settings to default?')) return;
  applySettings({
    fmt: 'sq', bgClass: 'bg-dark', colorKey: 'gray', currentAnim: 'spin',
    opacity: 0.45, speedMult: 1.0, movementAmp: 13,
    starCount: 12, baseSize: 11, orbitRadius: 88, innerRatio: 0.42,
    stabilize: false, stabilizePos: false, fixAxis: false, fixSize: false, showAxis: false,
    pulseAmt: 0.8, spinAmt: 0.4, axisPull: 0.0, axisNth: 2
  });
  currentVisualSettings = captureSettings();
}

function pcColor(key) { const p=palette[key]||palette.gray; return `rgb(${p.r},${p.g},${p.b})`; }

function renderPresets() {
  const panel = document.getElementById('presets-panel');
  panel.innerHTML = '';
  const fmtMap={'sq':'1:1','wide':'16:9','tall':'9:16','wide3':'3:1'};
  const isSeq = seqActive;
  const idleEntry = BUILTIN_LOTTIE[0];

  // ── Idle card ──
  {
    const ic = document.createElement('div');
    ic.className = 'pcard' + (isSeq && (seqPhase==='idle1'||seqPhase==='morph_back') ? ' active' : '');
    ic.style.cssText = 'margin-bottom:6px;';

    const ithumb = document.createElement('div'); ithumb.className='pcard-thumb-wrap';
    const lt = document.createElement('div'); lt.className='pcard-lottie-thumb';
    lt.innerHTML='<span class="lottie-loading">…</span>';
    ithumb.appendChild(lt);
    (async () => {
      try {
        const data = await decompressB64GZ(idleEntry.gz);
        lt.innerHTML = '';
        lottie.loadAnimation({ container: lt, renderer: 'svg', loop: true, autoplay: true, animationData: data });
      } catch(e) { lt.innerHTML='<span class="lottie-loading">err</span>'; }
    })();

function bakePhaseFrames(settings, anim, nFrames) {
  // Save globals
  const sv = {starCount,baseSize,orbitRadius,innerRatio,opacity,speedMult,pulseAmt,spinAmt,axisPull,movementAmp,colorKey,fixAxis,fixSize,stabilize,stabilizePos};
  const svT = t;
  // Apply settings to globals
  starCount   = Math.round(settings.starCount   ?? starCount);
  baseSize    = settings.baseSize    ?? baseSize;
  orbitRadius = settings.orbitRadius ?? orbitRadius;
  innerRatio  = settings.innerRatio  ?? innerRatio;
  opacity     = settings.opacity     ?? opacity;
  speedMult   = settings.speedMult   ?? speedMult;
  pulseAmt    = settings.pulseAmt    ?? pulseAmt;
  spinAmt     = settings.spinAmt     ?? spinAmt;
  axisPull    = settings.axisPull    ?? axisPull;
  movementAmp = settings.movementAmp ?? movementAmp;
  fixAxis     = settings.fixAxis     ?? fixAxis;
  fixSize     = settings.fixSize     ?? fixSize;
  stabilize   = settings.stabilize   ?? stabilize;
  stabilizePos= settings.stabilizePos?? stabilizePos;
  const tStep = 0.016 * (speedMult || 1) * 2;
  const n = starCount;
  const frames = Array.from({length: n}, () => []);
  for (let f = 0; f < nFrames; f++) {
    t = f * tStep;
    const savedStyle = animStyleForGetParams;
    animStyleForGetParams = anim;
    for (let i = 0; i < n; i++) {
      const p = getStarParams(i, 1.0);
      frames[i].push({
        x: p.x, y: p.y,
        rot: (p.rot || 0) * 180 / Math.PI,
        sz: Math.max(0.1, p.sz),
        op: Math.min(100, Math.max(0, p.fa * (opacity||1) / 0.45 * 100))
      });
    }
    animStyleForGetParams = savedStyle;
  }
  // Restore
  t=svT; starCount=sv.starCount; baseSize=sv.baseSize; orbitRadius=sv.orbitRadius;
  innerRatio=sv.innerRatio; opacity=sv.opacity; speedMult=sv.speedMult;
  pulseAmt=sv.pulseAmt; spinAmt=sv.spinAmt; axisPull=sv.axisPull;
  movementAmp=sv.movementAmp; colorKey=sv.colorKey; fixAxis=sv.fixAxis;
  fixSize=sv.fixSize; stabilize=sv.stabilize; stabilizePos=sv.stabilizePos;
  return frames;
}

function morphPhaseFrames(fromFrames, toFrames, nFrames) {
  const n = Math.max(fromFrames.length, toFrames.length);
  const out = Array.from({length: n}, () => []);
  for (let f = 0; f < nFrames; f++) {
    const alpha = easeInOut(f / Math.max(nFrames - 1, 1));
    for (let i = 0; i < n; i++) {
      const a = fromFrames[i] ? fromFrames[i][fromFrames[i].length - 1] : {x:CX,y:CY,rot:0,sz:0,op:0};
      const b = toFrames[i]   ? toFrames[i][0]                          : {x:CX,y:CY,rot:0,sz:0,op:0};
      out[i].push({
        x: a.x+(b.x-a.x)*alpha, y: a.y+(b.y-a.y)*alpha,
        rot: a.rot+(b.rot-a.rot)*alpha, sz: a.sz+(b.sz-a.sz)*alpha,
        op: a.op+(b.op-a.op)*alpha
      });
    }
  }
  return out;
}

function exportSequenceLottie(presetId) {
  const p = presets.find(x => x.id === presetId); if (!p) return;
  const fps = 30;
  const IDLE_F=60, MORPH_F=45, HOLD_F=180;
  const TOTAL_F = IDLE_F*2 + MORPH_F*2 + HOLD_F;

  const idleS  = Object.assign({}, IDLE_SETTINGS);
  const holdS  = p.settings;
  const holdA  = holdS.currentAnim || 'spin';

  const idleFrames = bakePhaseFrames(idleS,  'spin', IDLE_F);
  const holdFrames = bakePhaseFrames(holdS,  holdA,  HOLD_F);
  const morphToF   = morphPhaseFrames(idleFrames, holdFrames, MORPH_F);
  const morphBackF = morphPhaseFrames(holdFrames, idleFrames, MORPH_F);

  // Combine: idle1 + morph_to + hold + morph_back + idle2
  const allPhases = [idleFrames, morphToF, holdFrames, morphBackF, idleFrames];
  const exportN = Math.max(...allPhases.map(ph => ph.length));
  const combined = Array.from({length: exportN}, () => []);
  for (const phase of allPhases) {
    for (let i = 0; i < exportN; i++) {
      if (phase[i]) combined[i].push(...phase[i]);
      else {
        // pad with invisible star at center
        const last = combined[i].length ? combined[i][combined[i].length-1] : {x:CX,y:CY,rot:0,sz:0,op:0};
        const phLen = phase[0] ? phase[0].length : 0;
        for (let f = 0; f < phLen; f++) combined[i].push({...last, sz:0, op:0});
      }
    }
  }

  const pal = palette[idleS.colorKey] || palette['gray'];
  const fillC = [pal.r/255, pal.g/255, pal.b/255, 1];
  const bgHex = {'bg-dark':'#0e0e0f','bg-mid':'#1e1e20','bg-light':'#f0f0ec','bg-white':'#ffffff'};
  const bgColor = bgHex[idleS.bgClass] || '#0e0e0f';

  function vecKF(frames, getter) {
    const step = 2;
    const result = [];
    for (let idx = 0; idx < frames.length; idx += step) {
      const kf = {t: idx, s: getter(frames[idx])};
      if (idx + step < frames.length) { kf.i={x:[0.5],y:[0.5]}; kf.o={x:[0.5],y:[0.5]}; }
      result.push(kf);
    }
    if ((frames.length-1) % step !== 0) {
      result.push({t: frames.length-1, s: getter(frames[frames.length-1])});
    }
    return result;
  }
  function scalarKF(frames, getter) {
    const step = 2;
    const result = [];
    for (let idx = 0; idx < frames.length; idx += step) {
      const kf = {t: idx, s: [getter(frames[idx])]};
      if (idx + step < frames.length) { kf.i={x:[0.5],y:[0.5]}; kf.o={x:[0.5],y:[0.5]}; }
      result.push(kf);
    }
    if ((frames.length-1) % step !== 0) {
      result.push({t: frames.length-1, s: [getter(frames[frames.length-1])]});
    }
    return result;
  }

  const layers = [];
  const avgSzGlobal = IDLE_SETTINGS.baseSize || 11;
  for (let i = 0; i < exportN; i++) {
    const data = combined[i];
    const avgSz = data.reduce((s,d)=>s+d.sz,0)/data.length || avgSzGlobal;
    layers.push({
      ddd:0, ind:i+1, ty:4, nm:`Star ${i+1}`, sr:1,
      ks:{
        o:{a:1, k:scalarKF(data, d=>Math.round(d.op))},
        r:{a:1, k:scalarKF(data, d=>d.rot)},
        p:{a:1, k:vecKF(data, d=>[d.x,d.y,0])},
        a:{a:0, k:[0,0,0]},
        s:{a:1, k:vecKF(data, d=>[d.sz/avgSz*100,d.sz/avgSz*100,100])}
      },
      ao:0,
      shapes:[{ty:'gr',nm:'star',it:[
        {ty:'sh',nm:'star',ks:{a:0,k:{v:STAR21_V.map(([x,y])=>[x*avgSz/50,y*avgSz/50]),i:STAR21_I.map(([x,y])=>[x*avgSz/50,y*avgSz/50]),o:STAR21_O.map(([x,y])=>[x*avgSz/50,y*avgSz/50]),c:true}}},
        {ty:'fl',nm:'fill',o:{a:0,k:100},c:{a:0,k:fillC},r:1},
        {ty:'tr',p:{a:0,k:[0,0]},a:{a:0,k:[0,0]},s:{a:0,k:[100,100]},r:{a:0,k:0},o:{a:0,k:100},sk:{a:0,k:0},sa:{a:0,k:0}}
      ]}],
      ip:0, op:TOTAL_F, st:0, bm:0
    });
  }
  layers.push({
    ddd:0,ind:exportN+1,ty:1,nm:'Background',sr:1,
    ks:{o:{a:0,k:100},r:{a:0,k:0},p:{a:0,k:[300,300,0]},a:{a:0,k:[300,300,0]},s:{a:0,k:[100,100,100]}},
    sc:bgColor,sh:600,sw:600,ip:0,op:TOTAL_F,st:0,bm:0
  });

  const lottieJson = {v:'5.7.4',fr:fps,ip:0,op:TOTAL_F,w:600,h:600,
    nm:`${p.name} sequence`,ddd:0,assets:[],layers};
  const blob = new Blob([JSON.stringify(lottieJson)],{type:'application/json'});
  const a2 = document.createElement('a');
  a2.href = URL.createObjectURL(blob);
  a2.download = `${p.name.replace(/[^a-z0-9]/gi,'-')}-sequence.json`;
  a2.click();
}
