// ══════════════════════════════════
// PAIR SYSTEM
// ══════════════════════════════════



// ── Playback system ──
let playbackActive = false;
let currentVisualSettings = null; // tracks exactly what is currently drawn
let playbackFromSettings = null;
let playbackToSettings   = null;
let playbackFromAnim = 'spin';
let playbackToAnim   = 'spin';
let playbackBlend    = 1.0;   // 0=from, 1=to (fully arrived)
let playbackHold     = 0;     // hold counter after arriving
let playbackIndex    = -1;
const PLAYBACK_MORPH_SPEED = 0.012; // blend speed per frame (~1.5s morph)
const PLAYBACK_HOLD_FRAMES = 200;   // hold before advancing (~3.3s)

function lerpNum(a, b, t) { return a + (b - a) * t; }

function lerpAllSettings(a, b, t) {
  if (!a || !b) return b || a;
  const keys = ['starCount','baseSize','orbitRadius','innerRatio','opacity','movementAmp','speedMult','pulseAmt','spinAmt','axisPull'];
  const out = {...b};
  keys.forEach(k => { if (a[k]!=null && b[k]!=null) out[k] = lerpNum(a[k], b[k], t); });
  out.starCount = Math.round(out.starCount);
  return out;
}

function applyGlobals(s) {
  if (!s) return;
  starCount   = s.starCount   ?? starCount;
  baseSize    = s.baseSize    ?? baseSize;
  orbitRadius = s.orbitRadius ?? orbitRadius;
  innerRatio  = s.innerRatio  ?? innerRatio;
  opacity     = s.opacity     ?? opacity;
  movementAmp = s.movementAmp ?? movementAmp;
  speedMult   = s.speedMult   ?? speedMult;
  pulseAmt    = s.pulseAmt    ?? pulseAmt;
  spinAmt     = s.spinAmt     ?? spinAmt;
  axisPull    = s.axisPull    ?? axisPull;
  axisNth     = s.axisNth     ?? axisNth;
  if (s.colorKey)  colorKey  = s.colorKey;
}

function loadPresetWithMorph(id) {
  const p = presets.find(x=>x.id===id); if(!p)return;
  // Snapshot current star positions for position-based morph
  if (isOrbitStyle(currentAnim)) {
    starMorphFromPos = starCurrentPos.slice(0, 12).map(p => ({...p}));
  } else {
    starMorphFromPos = null;
  }
  // Snapshot current visual state BEFORE pausing (pausePlayback doesn't change globals)
  const fromSnap = currentVisualSettings ? {...currentVisualSettings} : captureSettings();
  const fromAnim = currentAnim;
  pausePlayback();
  playbackFromSettings = fromSnap;
  playbackFromAnim     = fromAnim;
  playbackToSettings   = p.settings;
  playbackToAnim       = p.settings.currentAnim || p.settings.idleAnim || 'spin';
  playbackBlend = 0;
  playbackHold  = PLAYBACK_HOLD_FRAMES + 1; // single-shot: don't auto-advance
  playbackIndex = presets.indexOf(p);
  activePresetId = id;
  playbackActive = true;
  renderPresets();
}


function startPlayback() {
  if (presets.length === 0) return;
  playbackActive = true;
  playbackIndex  = 0;
  playbackFromSettings = captureSettings();
  playbackFromAnim     = currentAnim;
  playbackToSettings   = presets[0].settings;
  playbackToAnim       = presets[0].settings.currentAnim || presets[0].settings.idleAnim || 'spin';
  playbackBlend = 0;
  playbackHold  = 0;
  renderPresets();
}

function pausePlayback() {
  playbackActive = false;
  // only re-render if we're on presets tab
  const presetsVisible = document.getElementById('tab-presets').style.display !== 'none';
  if (presetsVisible) renderPresets();
}

function advancePlayback() {
  // Snapshot current star positions before advancing to next preset
  starMorphFromPos = isOrbitStyle(playbackToAnim)
    ? starCurrentPos.slice(0, 12).map(q => ({...q}))
    : null;
  playbackIndex = (playbackIndex + 1) % presets.length;
  playbackFromSettings = playbackToSettings;
  playbackFromAnim     = playbackToAnim;
  playbackToSettings   = presets[playbackIndex].settings;
  playbackToAnim       = presets[playbackIndex].settings.currentAnim || presets[playbackIndex].settings.idleAnim || 'spin';
  playbackBlend = 0;
  playbackHold  = 0;
}

function tickSeqHold() {
  if (!seqActive) return;
  seqTimer--;
  if (seqTimer > 0) return;
  const p = presets.find(x => x.id === seqPresetId);
  if (!p) { seqActive=false; return; }
  if (seqPhase === 'idle1') {
    seqPhase = 'morph_to';
    starMorphFromPos = starCurrentPos.slice(0, starCount).map(q => ({...q}));
    playbackFromSettings = Object.assign({}, IDLE_SETTINGS);
    playbackFromAnim = 'spin';
    playbackToSettings = p.settings;
    playbackToAnim = p.settings.currentAnim || 'spin';
    playbackBlend = 0; playbackHold = 0;
    playbackIndex = presets.indexOf(p);
    playbackActive = true;
  } else if (seqPhase === 'hold_preset') {
    seqPhase = 'morph_back';
    starMorphFromPos = starCurrentPos.slice(0, starCount).map(q => ({...q}));
    playbackFromSettings = Object.assign({}, p.settings);
    playbackFromAnim = p.settings.currentAnim || 'spin';
    playbackToSettings = Object.assign({}, IDLE_SETTINGS);
    playbackToAnim = 'spin';
    playbackBlend = 0; playbackHold = 0;
    playbackActive = true;
  }
}

function tickSeqPhaseArrived() {
  if (!seqActive) return;
  if (seqPhase === 'morph_to') {
    seqPhase = 'hold_preset'; seqTimer = SEQ_HOLD_FRAMES;
    playbackActive = false;
    applySettings(playbackToSettings); currentAnim = playbackToAnim;
  } else if (seqPhase === 'morph_back') {
    playbackActive = false;
    applySettings(IDLE_SETTINGS); currentAnim = 'spin';
    if (seqAllPresets && seqAllIndex < presets.length - 1) {
      seqAllIndex++;
      seqPresetId = presets[seqAllIndex].id;
      activePresetId = seqPresetId;
      seqPhase = 'idle1'; seqTimer = SEQ_IDLE_FRAMES;
    } else {
      if (demoActive) {
        // Loop: restart from first preset
        seqAllIndex = 0;
        seqPresetId = presets[0].id;
        activePresetId = seqPresetId;
        seqPhase = 'idle1'; seqTimer = SEQ_IDLE_FRAMES;
      } else {
        seqActive = false; seqAllPresets = false;
        renderPresets();
      }
    }
  }
}

function playSequence(id) {
  const p = presets.find(x => x.id === id); if (!p) return;
  pausePlayback();
  applySettings(IDLE_SETTINGS); applyFmt(); currentAnim = 'spin';
  // Compute fresh idle star positions at current time t
  { const _sv = animStyleForGetParams; animStyleForGetParams = 'spin';
    for (let _i = 0; _i < 12; _i++) { const _p = getStarParams(_i, 1.0); starCurrentPos[_i] = {x:_p.x, y:_p.y, rot:_p.rot||0, sz:_p.sz, fa:_p.fa}; }
    animStyleForGetParams = _sv; }
  seqActive=true; seqAllPresets=false; seqPresetId=id;
  seqPhase='morph_to';
  starMorphFromPos = starCurrentPos.slice(0, 12).map(q => ({...q}));
  playbackFromSettings = Object.assign({}, IDLE_SETTINGS);
  playbackFromAnim = 'spin';
  playbackToSettings = p.settings;
  playbackToAnim = p.settings.currentAnim || 'spin';
  playbackBlend = 0; playbackHold = 0;
  playbackIndex = presets.indexOf(p); activePresetId = id;
  playbackActive = true;
  renderPresets();
}

function playAll() {
  if (!presets.length) return;
  pausePlayback();
  applySettings(IDLE_SETTINGS); applyFmt(); currentAnim = 'spin';
  seqActive=true; seqAllPresets=true; seqAllIndex=0;
  const p = presets[0];
  // Compute fresh idle positions
  { const _sv = animStyleForGetParams; animStyleForGetParams = 'spin';
    for (let _i = 0; _i < 12; _i++) { const _p = getStarParams(_i, 1.0); starCurrentPos[_i] = {x:_p.x, y:_p.y, rot:_p.rot||0, sz:_p.sz, fa:_p.fa}; }
    animStyleForGetParams = _sv; }
  seqPresetId=p.id; seqPhase='morph_to';
  starMorphFromPos = starCurrentPos.slice(0, 12).map(q => ({...q}));
  playbackFromSettings = Object.assign({}, IDLE_SETTINGS);
  playbackFromAnim = 'spin';
  playbackToSettings = p.settings;
  playbackToAnim = p.settings.currentAnim || 'spin';
  playbackBlend = 0; playbackHold = 0;
  playbackIndex = 0; activePresetId = p.id;
  playbackActive = true;
  renderPresets();
}

function stopSequence() {
  seqActive=false; seqAllPresets=false;
  pausePlayback();
  applySettings(IDLE_SETTINGS); applyFmt(); currentAnim='spin';
  renderPresets();
}

function tickPlayback() {
  if (!playbackActive || presets.length === 0) return;
  if (playbackBlend < 1) {
    playbackBlend = Math.min(1, playbackBlend + PLAYBACK_MORPH_SPEED);
    const eb0 = easeInOut(playbackBlend);
    const lerped = lerpAllSettings(playbackFromSettings, playbackToSettings, eb0);
    applyGlobals(lerped);
    currentVisualSettings = lerped;
    if (playbackBlend >= 1) {
      // Fully arrived at destination — apply ALL settings (bg, fmt, toggles too)
      applySettings(playbackToSettings);
      currentVisualSettings = {...playbackToSettings};
      currentAnim = playbackToAnim;
      activePresetId = presets[playbackIndex]?.id || null;
      renderPresets();
      if (seqActive) tickSeqPhaseArrived();
    }
  } else {
    if (seqActive) {
      tickSeqHold();
    } else if (playbackHold > PLAYBACK_HOLD_FRAMES) {
      if (playbackHold === PLAYBACK_HOLD_FRAMES + 1) {
        pausePlayback();
      } else {
        if (presets.length > 1) advancePlayback();
        else pausePlayback();
      }
    } else {
      playbackHold++;
    }
  }
}



applyFmt();
window.addEventListener('resize', () => { if (phoneMode) setupPhonePreview(); });
currentVisualSettings = captureSettings();

// ── Demo Mode ──
// Edit DEMO_QA to customise the Q&A bubbles
const DEMO_QA = [
  {
    q: "I lost my passport in Bangkok, but Hungary has no embassy here. What do I do?",
    a: "Don't panic — here's exactly what to do: 🇭🇺\n\nFile a police report immediately at the nearest Thai police station — you'll need this for everything else.\n\nContact the Hungarian Embassy in Kuala Lumpur — it covers Thailand. Reach them at +60 3-2182 8840.\n\nRequest an Emergency Travel Document (ETD) — a temporary one-way travel document for stranded citizens.\n\nWalk into any EU member state's embassy in Bangkok — they are obligated to assist EU citizens in emergencies."
  },
  {
    q: "My train was delayed and I missed my connecting flight. Am I entitled to compensation?",
    a: "Yes — EU law covers you here.\n\nUnder EC 261/2004, if your delay causes you to miss a connecting flight booked as one ticket and you arrive 3+ hours late, you're entitled to compensation of €250–€600 depending on distance.\n\nContact your airline in writing within 6 months. If they refuse, escalate to your national enforcement body."
  },
  {
    q: "I'm working in another EU country. Do I need a new health insurance?",
    a: "Not necessarily.\n\nAs an EU citizen working abroad, you're covered by the social security system of the country where you work — not your home country.\n\nYour employer should register you. You'll get a local health card. Your European Health Insurance Card (EHIC) from home remains valid for temporary stays but not for your new country of residence."
  }
];

let demoActive = false;
let demoPhase  = 'idle';
let demoTimer  = 0;
let demoQaIndex = 0;
let _demoMirrorId = null;

const DEMO_DUR = { idle: 60, listening: 220, speaking: 340 };

function openDemo() {
  if (!presets.length) return;
  demoActive  = true;
  demoPhase   = 'idle';
  demoTimer   = DEMO_DUR.idle;
  demoQaIndex = 0;
  document.getElementById('demo-overlay').style.display = 'flex';
  _updateDemoUI();
  _startDemoMirror();
  playAll();
}

function closeDemo() {
  demoActive = false;
  document.getElementById('demo-overlay').style.display = 'none';
  if (_demoMirrorId) { cancelAnimationFrame(_demoMirrorId); _demoMirrorId = null; }
  stopSequence();
}

function _startDemoMirror() {
  if (_demoMirrorId) cancelAnimationFrame(_demoMirrorId);
  (function mirror() {
    if (!demoActive) return;
    const dc = document.getElementById('demo-canvas');
    if (dc && canvas) {
      const ctx = dc.getContext('2d');
      ctx.clearRect(0, 0, 600, 600);
      ctx.drawImage(canvas, 0, 0, 600, 600);
    }
    _demoMirrorId = requestAnimationFrame(mirror);
  })();
}

function demoTick() {
  if (!demoActive) return;
  if (--demoTimer > 0) return;
  if      (demoPhase === 'idle')      { demoPhase = 'listening'; demoTimer = DEMO_DUR.listening; }
  else if (demoPhase === 'listening') { demoPhase = 'speaking';  demoTimer = DEMO_DUR.speaking;  }
  else {
    demoQaIndex = (demoQaIndex + 1) % DEMO_QA.length;
    demoPhase   = 'idle';
    demoTimer   = DEMO_DUR.idle;
  }
  _updateDemoUI();
}

function _updateDemoUI() {
  const stEl = document.getElementById('demo-status');
  const bbEl = document.getElementById('demo-bubble');
  if (!stEl || !bbEl) return;
  const qa = DEMO_QA[demoQaIndex % DEMO_QA.length] || {};

  bbEl.classList.remove('visible');
  setTimeout(() => {
    if (demoPhase === 'idle') {
      stEl.textContent = '';
      bbEl.innerHTML = '';
      bbEl.style.display = 'none';
    } else {
      bbEl.style.display = '';
      if (demoPhase === 'listening') {
        stEl.textContent = 'Listening...';
        bbEl.innerHTML = qa.q ? qa.q.replace(/\n/g, '<br>') : '';
      } else {
        stEl.textContent = 'Speaking...';
        bbEl.innerHTML = qa.a ? qa.a.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>') : '';
      }
      requestAnimationFrame(() => requestAnimationFrame(() => bbEl.classList.add('visible')));
    }
  }, 320);
}

loop();
